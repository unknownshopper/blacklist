<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacklist</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./script.js"></script>
</head>
<body>
    <div class="nav-bar">
        <a href="./search.html">Consultar</a>
        <a href="./captura.html">Capturar</a>
        <a href="#" id="logoutButton" class="logout-link">Cerrar Sesión</a>
    </div>
    <h1>Blacklist</h1>
    <p>Ingrese los nombres en sus campos respectivos</p>

    <form id="capturaForm">
        <div class="form-group">
            <label for="nombreCompleto">Nombre y Apellido Completo:</label>
            <input type="text" id="nombreCompleto" required>
        </div>
        <div class="form-group">
            <label for="empresa">Empresa:</label>
            <input type="text" id="empresa" required>
        </div>
        <div class="form-group">
            <label for="anoDespido">Año de Despido:</label>
            <input type="number" id="anoDespido" required>
        </div>
        <div class="form-group">
            <label for="motivo">Motivo de Despido:</label>
            <textarea id="motivo" required></textarea>
        </div>
        <button type="submit">Guardar Registro</button>
    </form>

    <div id="mensaje"></div>

    <script src="script.js"></script>
</body>
</html>
